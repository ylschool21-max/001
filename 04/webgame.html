<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 과일 잡기 게임 - Hand Tracking</title>
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid #1e293b;
            overflow: hidden;
            background: #000;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.85);
            z-index: 50;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .btn {
            background: #22c55e;
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-weight: bold;
            font-size: 1.25rem;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        .btn-restart {
            background: #ef4444;
        }

        .btn-restart:hover {
            background: #dc2626;
        }

        /* 홈 버튼 스타일 */
        .home-btn {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 100;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            backdrop-filter: blur(4px);
        }

        .home-btn:hover {
            background: rgba(51, 65, 85, 0.9);
            transform: scale(1.05);
        }

        #loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 홈 버튼 -->
    <a href="../index.html" class="home-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>홈으로</span>
    </a>

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-bold text-green-400 mb-1">AI 과일 잡기 🍎</h1>
        <p class="text-slate-400">손바닥을 움직여 떨어지는 과일을 획득하세요!</p>
    </div>

    <div id="game-wrapper">
        <!-- 로딩 오버레이 -->
        <div id="loading-overlay" class="overlay">
            <div id="loading-spinner"></div>
            <p class="text-lg">카메라와 AI 모델을 연결 중...</p>
        </div>

        <!-- 시작 오버레이 -->
        <div id="start-overlay" class="overlay hidden">
            <h2 class="text-4xl font-bold mb-4">준비되셨나요?</h2>
            <p class="mb-8 text-slate-300">목표: 60초 안에 20점 달성하기!</p>
            <button id="start-btn" class="btn">게임 시작하기</button>
        </div>

        <!-- 결과 오버레이 -->
        <div id="result-overlay" class="overlay hidden">
            <h2 id="result-title" class="text-5xl font-bold mb-2">승리!</h2>
            <p id="result-desc" class="text-xl mb-8 text-slate-300">10점을 달성했습니다.</p>
            <button id="restart-btn" class="btn btn-restart">다시 도전</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="mt-6 flex gap-8 text-sm text-slate-400">
        <div class="flex items-center gap-2">
            <span class="text-xl">🍎</span> 과일: +1점
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xl">💣</span> 쓰레기: -1점
        </div>
    </div>

    <video id="videoElement" class="hidden" playsinline></video>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('videoElement');
        
        const loadingOverlay = document.getElementById('loading-overlay');
        const startOverlay = document.getElementById('start-overlay');
        const resultOverlay = document.getElementById('result-overlay');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');

        // 게임 설정
        const WIDTH = 800;
        const HEIGHT = 600;
        const FRUITS = ['🍎', '🍌', '🍉', '🍇', '🍓', '🍍', '🍒', '🥝'];
        const TRASHES = ['🗑️', '💣', '🥫', '👞'];
        const WIN_SCORE = 20;
        const GAME_TIME = 60;

        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // 사운드 시스템
        let audioCtx = null;
        let bgmInterval = null;
        let bgmNoteIndex = 0;
        const bgmNotes = [261.63, 293.66, 329.63, 392.00, 440.00, 392.00, 329.63, 293.66];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(freq, type = 'sine', duration = 0.1, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function startBGM() {
            if (bgmInterval) clearInterval(bgmInterval);
            bgmNoteIndex = 0;
            bgmInterval = setInterval(() => {
                if (!isGameRunning) return;
                playSound(bgmNotes[bgmNoteIndex], 'sine', 0.4, 0.03);
                bgmNoteIndex = (bgmNoteIndex + 1) % bgmNotes.length;
            }, 250);
        }

        // 게임 상태
        let score = 0;
        let timeLeft = GAME_TIME;
        let isGameRunning = false;
        let lastHandPos = { x: -100, y: -100 };
        let items = [];
        let particles = [];
        let timerInterval;

        // MediaPipe Hands 설정
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: WIDTH,
            height: HEIGHT
        });

        camera.start().then(() => {
            loadingOverlay.classList.add('hidden');
            startOverlay.classList.remove('hidden');
        });

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // 웹캠 화면 반전 출력 (거울 모드)
            ctx.translate(WIDTH, 0);
            ctx.scale(-1, 1);
            ctx.globalAlpha = 0.7;
            ctx.drawImage(results.image, 0, 0, WIDTH, HEIGHT);
            ctx.globalAlpha = 1.0;
            ctx.restore();

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const palm = landmarks[9];
                lastHandPos = {
                    x: (1 - palm.x) * WIDTH,
                    y: palm.y * HEIGHT
                };

                ctx.beginPath();
                ctx.arc(lastHandPos.x, lastHandPos.y, 30, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(34, 197, 94, 0.3)';
                ctx.fill();
                ctx.strokeStyle = '#22c55e';
                ctx.lineWidth = 4;
                ctx.stroke();

                if (isGameRunning) {
                    checkCollisions(lastHandPos);
                }
            }

            if (isGameRunning) {
                updateItems();
                updateParticles();
            }
            
            drawUI();
        }

        function spawnItem() {
            if (!isGameRunning) return;
            const isFruit = Math.random() > 0.3;
            const type = isFruit 
                ? FRUITS[Math.floor(Math.random() * FRUITS.length)]
                : TRASHES[Math.floor(Math.random() * TRASHES.length)];
            
            items.push({
                x: Math.random() * (WIDTH - 100) + 50,
                y: -50,
                type: type,
                isFruit: isFruit,
                speed: 3 + Math.random() * 5 + (score / 10),
                size: 50
            });

            const nextSpawn = Math.max(400, 1000 - (score * 20));
            setTimeout(spawnItem, nextSpawn);
        }

        function updateItems() {
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;

                ctx.font = `${item.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.type, item.x, item.y);

                if (item.y > HEIGHT + 60) {
                    items.splice(i, 1);
                }
            }
        }

        function checkCollisions(hand) {
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                const dx = hand.x - item.x;
                const dy = hand.y - item.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 55) {
                    createParticles(item.x, item.y, item.isFruit ? '#4ade80' : '#94a3b8');
                    if (item.isFruit) {
                        score++;
                        playSound(523.25 + (score * 10), 'triangle', 0.1, 0.15);
                    } else {
                        score = Math.max(0, score - 1);
                        playSound(150, 'sawtooth', 0.3, 0.1);
                    }
                    items.splice(i, 1);

                    if (score >= WIN_SCORE) {
                        endGame(true);
                    }
                }
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 5 + 2
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.04;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function drawUI() {
            ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
            ctx.fillRect(0, 0, WIDTH, 60);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Pretendard';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score} / ${WIN_SCORE}`, 20, 38);

            ctx.textAlign = 'right';
            const isCritical = timeLeft <= 10;
            ctx.fillStyle = isCritical ? '#ef4444' : '#22c55e';
            ctx.fillText(`TIME: ${timeLeft}s`, WIDTH - 20, 38);
            
            if (isCritical && isGameRunning && Math.floor(Date.now() / 500) % 2 === 0) {
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 4;
                ctx.strokeRect(2, 2, WIDTH - 4, HEIGHT - 4);
            }
        }

        function startGame() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            score = 0;
            timeLeft = GAME_TIME;
            items = [];
            particles = [];
            isGameRunning = true;
            
            startOverlay.classList.add('hidden');
            resultOverlay.classList.add('hidden');

            startBGM();

            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);

            spawnItem();
        }

        function endGame(isSuccess) {
            isGameRunning = false;
            clearInterval(timerInterval);
            if (bgmInterval) clearInterval(bgmInterval);

            resultTitle.innerText = isSuccess ? 'MISSION COMPLETE! 🎉' : 'GAME OVER 💀';
            resultTitle.className = `text-5xl font-bold mb-2 ${isSuccess ? 'text-green-400' : 'text-red-500'}`;
            resultDesc.innerText = isSuccess 
                ? `${GAME_TIME - timeLeft}초 만에 ${WIN_SCORE}점을 달성했습니다!` 
                : `시간이 종료되었습니다. 최종 점수: ${score}점`;

            resultOverlay.classList.remove('hidden');
            
            const msg = new SpeechSynthesisUtterance(isSuccess ? "축하합니다! 미션 성공입니다." : "아쉽네요. 다시 도전해 보세요.");
            msg.lang = 'ko-KR';
            window.speechSynthesis.speak(msg);
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
